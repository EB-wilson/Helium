modpack.distribute.name = Распространение
modpack.distribute.description = В режиме распространения сборка просто устанавливает объединённые моды и файлы в игру игрока, не затрагивая исходные файлы, кроме случаев дублирования.
modpack.shadow.name = Скрытый
modpack.shadow.description = В скрытом режиме после установки сборки все остальные моды, установленные игроком, будут отключены, но это не повлияет на исходные игровые файлы.
modpack.override.name = Замещение
modpack.override.description = В режиме замещения при установке сборки создаётся полная резервная копия исходных игровых файлов, после чего файлы сборки полностью замещают файлы в каталоге игры.

